# Here you can define all your data sets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://kedro.readthedocs.io/en/stable/data/data_catalog.html
2025.preprocessing.raw:
  type: partitions.PartitionedDataset
  path: data/01_raw/2025
  dataset:
    type: pandas.CSVDataset
    load_args:
      index_col: 0
  filename_suffix: .csv


2025.preprocessing.concat:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/concat_2025.csv
  save_args:
    index: False


2025.preprocessing.preprocessed:
  type: pandas.CSVDataset
  filepath: data/03_primary/preprocessed_2025.csv
  save_args:
    index: False
